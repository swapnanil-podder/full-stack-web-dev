<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webfonts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0" />
    <style>
      body {
        font-family: "Montserrat", sans-serif;
      }
      .italic {
        font-style: italic;
      }
      .black {
        font-weight: 900;
      }
      .material-symbols-outlined{
        color: red;
        font-weight: 900;
        font-size: 3rem;
        
      }
    </style>
  </head>
  <body>
    <p>hello world! webfonts</p>
    <p class="italic">Italic</p> 
    <p class="black">black</p>
    <p class="black italic">Italic black</p>
    
    <span class="material-symbols-outlined">favorite</span>
  </body>
</html>
