<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      a:link {
        color: blueviolet;
        text-decoration: none;
      }
      a:hover {
        color: magenta;
        text-decoration: underline;
      }
      a:visited {
        color: green;
      }
      a:active {
        color: orange;
      }
      .hover-div {
        background-color: green;
        padding: 25px;
        text-align: center;
      }
      .hover-div:hover {
        color: yellow;
      }
    </style>
  </head>
  <body>
    <a href="https://google.com"> Unvisited Link</a>
    <br />
    <a href="https://Facebook.com"> Visited Link</a>
    <br />
    <a href="https://Facebook.com"> Hover Link</a>
    <br />
    <div class="hover-div">Mouse Over Me</div>
  </body>
</html>
