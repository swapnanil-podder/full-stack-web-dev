<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unordered List</title>
  </head>

  <body>
    <ol>
      <li>Apples</li>
      <li>Bananas</li>
      <li>Oranges</li>
    </ol>

    <ul>
      <h4>
        <li>Fruits</li>
      </h4>
      <ul>
        <li>Apples</li>
        <li>Bananas</li>
        <li>Oranges</li>
      </ul>
    </ul>

    <ul>
      <h4>
        <li>Vegetables</li>
      </h4>
      <ul>
        <li>Carrots</li>
        <li>Broccoli</li>
      </ul>
    </ul>

    <ul>
      <li>
        <h4>John Doe</h4>
        <p>john@gmail.com</p>
      </li>
      <li>
        <h4>Mark Doe</h4>
        <p>mark@gmail.com</p>
      </li>
    </ul>

    <ul>
      <li>
        <h4>John Doe</h4>
        <ul>
            <li>john@gmail.com</li>
        </ul>
      </li>
      <li>
        <h4>Mark Doe</h4>
        <ul>
            <li>mark@gmail.com</li>
        </ul>
      </li>
    </ul>
  </body>
</html>
