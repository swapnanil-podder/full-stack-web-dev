<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Block vs Inline Elements</title>
  </head>
  <body>
    <!-- block element -->
    <p style="border: 9px inset rgb(86, 177, 86)">Hello World</p>
    <div style="border: 9px inset rgb(86, 177, 86)">Hello World</div>
    <!-- inline element -->
    <a href="https://google.com" style="border: 1px solid black">Google</a>
    <a href="https://facebook.com" style="border: 1px solid black">facebook</a>
  </body>
</html>
