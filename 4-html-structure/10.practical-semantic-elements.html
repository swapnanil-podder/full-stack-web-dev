<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practical Semantic Elements</title>
  </head>

  <body>
    <header>
      <span>
        <img height="30px" src="ico/favicon.ico" alt="" />
      </span>
      <nav>
        <ul>
          <li><a href="#">Categories</a></li>
          <li><a href="#">Tags</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h1>The HTML Blog</h1>

      <section>
        <article>
          <header>
            <h2>Blog Title One</h2>
          </header>
          <p>Blog Description</p>
          <a href="#">Read Blog</a>
        </article>
        <article>
          <header>
            <h2>Blog Title Two</h2>
          </header>
          <p>Blog Description</p>
          <a href="#">Read Blog</a>
        </article>
      </section>
 
      <div>
        <section>
          <aside>
            <h3>Latest Blogs</h3>
            <ul>
              <li><a href="#">Blog Link 1</a></li>
              <li><a href="#">Blog Link 2</a></li>
            </ul>
          </aside>
        </section>
      </div>
    </main>
  </body>
</html>
